{
  canceledTrips(first: 2, filters: { include: [{ modes: [BUS] }] }) {
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
    edges {
      node {
        serviceDate
        end {
          schedule {
            time {
              ... on ArrivalDepartureTime {
                arrival
              }
            }
          }
          realTime {
            arrival {
              delay
              time
            }
          }
          stopLocation {
            ... on Stop {
              gtfsId
            }
          }
        }
        start {
          schedule {
            time {
              ... on ArrivalDepartureTime {
                departure
              }
            }
          }
          realTime {
            departure {
              delay
              time
            }
          }
          stopLocation {
            ... on Stop {
              gtfsId
            }
          }
        }
        stopCalls {
          schedule {
            time {
              ... on ArrivalDepartureTime {
                arrival
                departure
              }
            }
          }
          realTime {
            arrival {
              delay
              time
            }
            departure {
              delay
              time
            }
          }
          stopLocation {
            ... on Stop {
              gtfsId
            }
          }
        }
        trip {
          gtfsId
        }
      }
    }
  }
}
